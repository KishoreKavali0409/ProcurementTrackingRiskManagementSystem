services:
  backend:
    build: ./backend
    container_name: procuretrack-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    restart: always

  frontend:
    build: .
    container_name: procuretrack-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    depends_on:
      - backend
    restart: always
